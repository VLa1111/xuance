# Multi-Agent RL for PyBullet Drones
# Configuration for MADDPG algorithm on drone formation control

dl_toolbox: "torch"
project_name: "Drone_Formation"
logger: "tensorboard"
render: True
render_mode: 'rgb_array'
fps: 30
device: "cuda:0"
distributed_training: False

# Algorithm
agent: "MADDPG"
env_name: "drones"
env_id: "MultiHoverAviary"
continuous_action: True
learner: "MADDPG_Learner"
policy: "MADDPG_Policy"
representation: "Basic_Identical"
vectorize: "SubprocVecMultiAgentEnv"

# Network architecture
representation_hidden_size: []
actor_hidden_size: [128, 128]
critic_hidden_size: [128, 128]
activation: 'leaky_relu'
activation_action: 'sigmoid'

# Agent settings
use_parameter_sharing: True
use_actions_mask: False

# Training hyperparameters
seed: 42
parallels: 8
buffer_size: 100000
batch_size: 256
learning_rate_actor: 0.0005
learning_rate_critic: 0.0005
gamma: 0.99
tau: 0.001

# Exploration noise
start_noise: 1.0
end_noise: 0.1
sigma: 0.2
start_training: 5000
running_steps: 3000000
training_frequency: 25

# Evaluation
eval_interval: 100000
test_episode: 5

# Logging
log_dir: "logs/maddpg_drones/"
model_dir: "models/maddpg_drones/"